{% extends 'shop/base.html' %}

{% block body %}

<div class="bg-gray-100 min-h-screen py-10">

    <div class="max-w-7xl mx-auto px-4">

        <!-- Product Card -->
        <div class="bg-white rounded-3xl shadow-xl overflow-hidden">

            <div class="grid grid-cols-1 md:grid-cols-2 gap-8 p-8">

                <!-- Product Image -->
                <div class="flex justify-center items-center">
                    <img 
                        src="{{ product_object.image }}" 
                        alt="{{ product_object.title }}"
                        class="w-full object-contain h-[600px]"
                    >
                </div>

                <!-- Product Details -->
                <div class="flex flex-col justify-center">

                    <!-- Category -->
                    <span class="inline-block bg-green-100 text-green-700 text-sm font-semibold px-4 py-1 rounded-full w-fit mb-4">
                        {{ product_object.category }}
                    </span>

                    <!-- Title -->
                    <h1 class="text-4xl font-bold text-gray-800 mb-4">
                        {{ product_object.title }}
                    </h1>

                    <!-- Pricing -->
                    <div class="flex items-center gap-4 mb-6">

                        <span class="text-3xl font-bold text-green-600">
                            ₹{{ product_object.discounted_price }}
                        </span>

                        <span class="text-xl text-gray-400 line-through">
                            ₹{{ product_object.price }}
                        </span>

                    </div>

                    <!-- Buttons -->
                    <div class="flex flex-wrap gap-4">

                        <button class="bg-green-600 hover:bg-green-700 text-white px-8 py-3 rounded-xl font-semibold shadow-lg transition duration-300 hover:scale-105">
                            Add to Cart
                        </button>

                        <button class="border border-green-600 text-green-600 hover:bg-green-600 hover:text-white px-8 py-3 rounded-xl font-semibold transition duration-300">
                            Buy Now
                        </button>

                    </div>

                    <!-- Description -->
                    <p class="text-gray-600 leading-relaxed mb-8 mt-4">
                        {{ product_object.description }}
                    </p>

                    

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock body %}
