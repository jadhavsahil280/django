{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amazon</title>

      <link rel="icon" type="image/x-icon" href="{% static 'shop/images/logo/fav.webp' %}">


    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">


    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
        ></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js"></script>

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{% static 'shop/style.css' %}">

</head>

<body>


    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg custom-navbar sticky">

        <div class="container">

            <!-- Logo -->
            <a class="navbar-brand" href="{% url 'index' %}">

                <img 
                    src="{% static 'shop/images/logo/logo.png' %}" 
                    alt="Logo"
                    class="logo-img"
                >

            </a>


            <!-- Mobile Toggle -->
            <button class="navbar-toggler custom-toggler"
                    type="button"
                    data-bs-toggle="collapse"
                    data-bs-target="#navbarContent">

                <span class="navbar-toggler-icon"></span>

            </button>


            <!-- Navbar Content -->
            <div class="collapse navbar-collapse" id="navbarContent">


                <!-- Left Menu -->
                <ul class="navbar-nav mx-auto mb-2 mb-lg-0">

                    <li class="nav-item">
                        <a class="nav-link custom-nav-link active" href="#">
                            Home
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link custom-nav-link" href="#">
                            Products
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link custom-nav-link" href="#">
                            Categories
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link custom-nav-link" href="#">
                            About
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link custom-nav-link" href="#">
                            Contact
                        </a>
                    </li>

                </ul>


                <!-- Right Side -->
                <div class="d-flex align-items-center gap-3">


                    <!-- Cart -->
                    <div class="cart-wrapper">
                        
                        <button type="button" id="cart" class="cart-btn" data-bs-toggle="popover" data-bs-html="true" data-bs-content="<h6>This is the cart</h6>">
                    
                            <img src="{% static 'shop/images/cart.png' %}" class="cart">
                    
                            <!-- Cart Count -->
                            <span id="cart-count" class="cart-count">                    
                                0                    
                            </span>
                    
                        </button>
                    
                    </div>


                    <!-- Profile -->
                    <img 
                        src="{% static 'shop/images/profile-picture.jpg' %}" 
                        alt=""
                        class="profile-img"
                    >

                </div>

            </div>

        </div>

    </nav>



    {% block body %}
    {% endblock body %}


</body>

<script type="text/javascript">

    if(localStorage.getItem('cart') == null){
        var cart = {};
    }
    else{
        var cart = JSON.parse(localStorage.getItem('cart'));        
        document.getElementById('cart-count').innerHTML = Object.keys(cart).length;
    }

    $(document).on('click', '.atc', function(e){

        e.preventDefault();

        var item_id = this.id.toString();

        // Get product details
        let name = $("#name" + item_id).text();

        let price = $("#price" + item_id).text();

        let image = $("#image" + item_id).attr("src");

        if(cart[item_id] != undefined){
            cart[item_id].qty += 1;
        }
        else{
            cart[item_id] = {

                name: name,

                price: parseFloat(price),

                image: image,

                qty: 1
            };
        }

        localStorage.setItem('cart', JSON.stringify(cart));
        document.getElementById('cart-count').innerHTML = Object.keys(cart).length;

        
        DisplayCart(cart);


    });


const cartBtn = document.getElementById("cart")

const popover = new bootstrap.Popover(cartBtn, {
    html: true,

    sanitize: false,
    content: "<h6>Initial Content</h6>"
})

cartBtn.addEventListener("click", function () {

    popover.setContent({
        '.popover-body': '<h6>Updated Cart Content</h6>'
    })

    DisplayCart(cart);

    
    

    $(document).on('click', '.remove-item', function(){

        let item_id = $(this).data('id');

        // Remove from cart
        delete cart[item_id];

        // Update localStorage
        localStorage.setItem('cart', JSON.stringify(cart));

        // Update cart count
        document.getElementById('cart-count').innerHTML =
            Object.keys(cart).length;

        // Refresh cart UI
        DisplayCart(cart);

    });

})
function DisplayCart(cart){

        var cartString = `

        <div>

            <h6 class="mb-3 border-bottom pb-2">
                Your Cart
            </h6>

        `;

        var grandTotal = 0;

        for (var i in cart){

            let item = cart[i];

            let name = item.name;

            let price = item.price;

            let image = item.image;

            let qty = item.qty;

            let total = qty * price;

            grandTotal += total;

            cartString += `

                <div class="d-flex align-items-start mb-3 border-bottom pb-2">

                    <img src="${image}" 
                        width="50" 
                        height="50"
                        style="object-fit:cover;border-radius:6px">

                    <div class="ms-2 flex-grow-1">

                        <!-- Product Name -->
                        <div class="cart-hover-title">
                            ${name}
                        </div>

                        <!-- Qty + Price + Total -->
                        <div class="d-flex justify-content-between mt-2">

                            <small class="text-muted">
                                ${qty} X ₹${price.toLocaleString('en-IN')}
                            </small>

                            <b>
                                Total: ₹${total.toLocaleString('en-IN')}
                            </b>

                        </div>

                        <!-- Remove Button -->
                        <button class="btn btn-sm btn-outline-danger remove-item mt-2"
                            data-id="${i}">
                            Remove
                        </button>

                    </div>

                </div>

                `;
        }

        cartString += `

            <div class="d-flex justify-content-between mt-3">

                <strong>Total</strong>

                <strong class="text-success">
                    ₹${grandTotal}
                </strong>

            </div>

            <button class="btn btn-primary btn-sm w-100 mt-3">
                Checkout
            </button>

        </div>
        `;

        popover.setContent({
            '.popover-body': cartString
        });

    }
</script>
</html>
