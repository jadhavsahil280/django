{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food App</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>


    <link rel="stylesheet" href="{% static 'food/style.css' %}">
</head>
<body>
    <nav class="navbar bg-black text-white px-5">
        <a href="{% url 'food:index' %}" class="navbar-brand text-white">Food App</a>
        <div class="navbar gap-5">
            <a href="{% url 'food:index' %}" class="nav-item nav-link">Home</a>
            <a href="{% url 'food:create_item' %}" class="nav-item nav-link">Add Item</a>
            <a href="#" class="nav-item nav-link">View Item</a>

            {% if user.is_authenticated %}
                    <a href="{% url 'users:profile' %}" class="bg-green-500 text-white px-4 py-1 rounded-lg hover:bg-green-600">Profile</a>
                {% else %}
                    
                    <a href="{% url 'users:login' %}" class="bg-green-500 text-white px-4 py-1 rounded-lg hover:bg-green-600">Login</a>

            {% endif %}
        </div>
    </nav>

    {% if messages %}
        {% for message in messages %}
            {{message}}
        {% endfor %}
    {% endif %}

    {% block body %}{% endblock body %}

</body>
</html>
