{% extends "food/base.html" %} 

{% block body %}

<section class="container py-5">

    <div class="row align-items-center g-5">

        <!-- Image Section -->
        <div class="col-md-5">
            <div class="bg-white rounded-4 shadow overflow-hidden">
                <img src="{{ object.item_image }}" 
                     class="w-100 object-fit-cover">
            </div>
        </div>

        <!-- Content Section -->
        <div class="col-md-7">

            <h2 class="fw-bold mb-1">
                {{ object.item_name }}
            </h2>
            <p class="fw-bold mb-3">Uploaded By: {{ object.user_name }}</p>

            <p class="text-muted mb-3">
                {{ object.item_desc }}
            </p>

            <h3 class="text-success fw-bold mb-4">
                ₹ {{ object.item_price }}
            </h3>

            <!-- Buttons -->
            <div class="d-flex gap-3">

                <a href="#" class="btn btn-success px-4 py-2 rounded-3">
                    🛒 Add to Cart
                </a>

                <a href="#" class="btn btn-outline-dark px-4 py-2 rounded-3">
                    ❤️ Wishlist
                </a>

            </div>

            <!-- Extra Info -->
            <div class="mt-4 text-muted small">
                <p>✔ Freshly prepared</p>
                <p>✔ Hygienic packaging</p>
                <p>✔ Fast delivery available</p>
            </div>

        </div>

    </div>

</section>

{% endblock body %}
