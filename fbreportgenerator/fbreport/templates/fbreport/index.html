<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AD Expense Generator</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background: #f4f6f9;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
        }

        .upload-card{
            width: 100%;
            max-width: 450px;
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }

        .title{
            text-align: center;
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 30px;
            color: #0d6efd;
        }

        .btn-submit{
            width: 100%;
            padding: 10px;
            font-size: 18px;
        }
    </style>
</head>
<body>

    <div class="upload-card">
        <div class="title">AD Expense Generator</div>

        <form method="post"  enctype="multipart/form-data">
            {% csrf_token %}
            <div class="mb-4">
                <label class="form-label">Upload Excel File</label>
                <input type="file" name="file" class="form-control" accept=".xlsx,.xls">
            </div>

            <button type="submit" class="btn btn-primary btn-submit">
                Submit
            </button>
        </form>
    </div>

</body>
</html>
